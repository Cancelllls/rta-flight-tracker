version: '3.8'

services:
  rta-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9876"
    networks:
      - coolify

  rta-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - rta-backend
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rta-flight.rule=Host(`rta.cancellls.com`)"
      - "traefik.http.routers.rta-flight.entrypoints=http,https"
      - "traefik.http.routers.rta-flight.tls.certresolver=letsencrypt"
      - "traefik.http.services.rta-flight.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

networks:
  coolify:
    external: true
